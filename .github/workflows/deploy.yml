name: Build and Publish Docker Image
on:
  push:
    branches: [main, dev/jfi]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      runner:
        description: Choose the runner for a manual execution
        required: true
        default: self_hosted_macbook
        type: choice
        options:
          - ubuntu-latest
          - self_hosted_macbook

permissions:
  contents: read
  packages: write

jobs:
  publish-public-image:
    # runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && fromJSON('["self-hosted", "macOS", "ARM64"]') || 'ubuntu-latest' }}
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'self-hosted' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push public image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: local-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=telescrap-public-image
          cache-to: type=gha,mode=max,scope=telescrap-public-image
